<!doctype html>
<html lang="en">
  <body style="margin: 0; background: #080a0f; color: #f5f1e8; font-family: Arial, sans-serif">
    <div style="margin: 0 auto; max-width: 520px; padding: 48px 24px">
      <p
        style="
          margin: 0 0 24px;
          color: #f3c93f;
          font-size: 12px;
          font-weight: 700;
          letter-spacing: 0.18em;
          text-transform: uppercase;
        "
      >
        UniMarket
      </p>
      <h1 style="margin: 0 0 12px; font-size: 28px; line-height: 1.2">
        Verify your Waterloo email
      </h1>
      <p style="margin: 0 0 28px; color: #b9b7b1; font-size: 16px; line-height: 1.6">
        Enter this code in UniMarket:
      </p>
      <p
        style="
          margin: 0 0 28px;
          border: 1px solid #806b28;
          background: #12151c;
          padding: 20px;
          color: #f8d86e;
          font-size: 32px;
          font-weight: 700;
          letter-spacing: 0.24em;
          text-align: center;
        "
      >
        {{ .Token }}
      </p>
      <p style="margin: 0; color: #8f8d87; font-size: 14px; line-height: 1.6">
        This code expires in 15 minutes. If you did not create this account, ignore this email.
      </p>
    </div>
  </body>
</html>
